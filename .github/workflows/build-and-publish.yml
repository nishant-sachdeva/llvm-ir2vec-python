name: Build and Publish Wheels

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ===========================================================================
# PHASE 1: Build and install LLVM static libraries (once per platform)
#
# Builds LLVM with PIC, then runs `cmake --install` to produce a compact
# install prefix (~200-400 MB compressed). The install prefix contains:
#   - include/llvm/        (public headers)
#   - lib/*.a              (static libraries)
#   - lib/cmake/llvm/      (CMake config for find_package)
#
# Note: LLVMEmbUtils is BUILDTREE_ONLY and is NOT in the install prefix.
# Phase 2 compiles it from source (1 .cpp file) alongside the binding.
#
# Linux builds run inside manylinux_2_28 containers to ensure the resulting
# binaries only depend on glibc 2.28+.
# ===========================================================================
jobs:
  build-llvm:
    name: "LLVM / ${{ matrix.platform }}"
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64

          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          yum install -y cmake3 git
          if ! command -v cmake &>/dev/null; then
            ln -s $(which cmake3) /usr/local/bin/cmake
          fi
          /opt/python/cp311-cp311/bin/pip install ninja
          ln -sf "$(/opt/python/cp311-cp311/bin/python -c 'import ninja; print(ninja.BIN_DIR)')/ninja" \
            /usr/local/bin/ninja
          echo "cmake: $(cmake --version | head -1)"
          echo "ninja: $(ninja --version)"

      - name: Read LLVM version
        id: llvm-ver
        run: echo "version=$(cat LLVM_VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Cache LLVM install
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-install
          key: llvm-install-${{ matrix.platform }}-${{ steps.llvm-ver.outputs.version }}-${{ hashFiles('buildscripts/build_llvm.sh') }}

      - name: Build LLVM (Phase 1)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          chmod +x buildscripts/build_llvm.sh
          ./buildscripts/build_llvm.sh

      - name: Package install prefix
        run: tar cf llvm-install.tar llvm-install/

      - name: Upload LLVM install
        uses: actions/upload-artifact@v4
        with:
          name: llvm-${{ matrix.platform }}
          path: llvm-install.tar
          retention-days: 1
          compression-level: 6

  # ===========================================================================
  # PHASE 2 + 3: Build nanobind module + wheel (per platform × Python version)
  #
  # Phase 2 builds a standalone CMake project that:
  #   1. Finds the installed LLVM via find_package(LLVM)
  #   2. Compiles LLVMEmbUtils from source (1 file: Utils.cpp)
  #   3. Compiles the nanobind binding (1 file: PyIR2Vec.cpp)
  #   4. Links everything against the installed LLVM .a libraries
  # Total: 2 .cpp files + 1 link step ≈ 30 seconds. No LLVM recompilation.
  #
  # Phase 3 packages the module into a manylinux wheel via auditwheel.
  # The wheel includes:
  #   - ir2vec/__init__.py       (Python wrapper)
  #   - ir2vec/ir2vec.cpython-*.so (nanobind native module)
  #   - ir2vec/vocab.py          (vocabulary path resolver)
  #   - ir2vec/vocab_data/*.json (bundled vocabulary files)
  # ===========================================================================
  build-wheels:
    name: "Wheel / ${{ matrix.platform }} / py${{ matrix.python }}"
    needs: build-llvm
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux x86_64 ----
          - platform: linux-x86_64
            python: "3.10"
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            manylinux-plat: manylinux_2_28_x86_64
          - platform: linux-x86_64
            python: "3.11"
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            manylinux-plat: manylinux_2_28_x86_64
          - platform: linux-x86_64
            python: "3.12"
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            manylinux-plat: manylinux_2_28_x86_64
          - platform: linux-x86_64
            python: "3.13"
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            manylinux-plat: manylinux_2_28_x86_64

          # ---- Linux aarch64 ----
          - platform: linux-aarch64
            python: "3.10"
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            manylinux-plat: manylinux_2_28_aarch64
          - platform: linux-aarch64
            python: "3.11"
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            manylinux-plat: manylinux_2_28_aarch64
          - platform: linux-aarch64
            python: "3.12"
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            manylinux-plat: manylinux_2_28_aarch64
          - platform: linux-aarch64
            python: "3.13"
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            manylinux-plat: manylinux_2_28_aarch64

    steps:
      - uses: actions/checkout@v4

      # --- Download and extract LLVM install prefix ---
      - name: Download LLVM install
        uses: actions/download-artifact@v4
        with:
          name: llvm-${{ matrix.platform }}

      - name: Extract LLVM install
        run: tar xf llvm-install.tar

      # --- Install build tools ---
      - name: Install build deps
        run: |
          yum install -y cmake3 git 2>/dev/null || true
          if ! command -v cmake &>/dev/null; then
            if command -v cmake3 &>/dev/null; then
              ln -s $(which cmake3) /usr/local/bin/cmake
            fi
          fi
          /opt/python/cp311-cp311/bin/pip install ninja
          ln -sf "$(/opt/python/cp311-cp311/bin/python -c 'import ninja; print(ninja.BIN_DIR)')/ninja" \
            /usr/local/bin/ninja
          echo "cmake: $(cmake --version | head -1)"
          echo "ninja: $(ninja --version)"

      # --- Clone LLVM source for ir2vec .cpp files ---
      - name: Read LLVM version
        id: llvm-ver
        run: echo "version=$(cat LLVM_VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Clone LLVM source (shallow)
        run: |
          git clone --depth 1 --branch "${{ steps.llvm-ver.outputs.version }}" \
            https://github.com/llvm/llvm-project.git llvm-project

      # --- Set up Python ---
      - name: Find Python
        id: py
        run: |
          PY_TAG="cp$(echo '${{ matrix.python }}' | tr -d '.')"
          PY_DIR=$(find /opt/python -maxdepth 1 -name "${PY_TAG}-*" | head -1)
          if [ -z "$PY_DIR" ]; then
            echo "ERROR: Python ${{ matrix.python }} not found in /opt/python/"
            ls /opt/python/
            exit 1
          fi
          PY="${PY_DIR}/bin/python"
          echo "exe=$PY" >> "$GITHUB_OUTPUT"
          echo "Using: $($PY --version) at $PY"

      # --- Phase 2: Build nanobind module (2 files, ~30 sec) ---
      - name: Build binding
        run: |
          chmod +x buildscripts/build_binding.sh
          ./buildscripts/build_binding.sh \
            "${{ steps.py.outputs.exe }}" \
            ./llvm-install \
            ./llvm-project \
            ./package/ir2vec/

      # --- Verify the module before packaging ---
      - name: Test module
        run: |
          chmod +x buildscripts/test_module.sh
          ./buildscripts/test_module.sh \
            "${{ steps.py.outputs.exe }}" \
            ./package/

      # --- Phase 3: Build and repair wheel ---
      - name: Install patchelf
        run: yum install -y patchelf 2>/dev/null || "${{ steps.py.outputs.exe }}" -m pip install patchelf

      - name: Build wheel
        env:
          MANYLINUX_PLAT: ${{ matrix.manylinux-plat }}
        run: |
          chmod +x buildscripts/build_wheel.sh
          ./buildscripts/build_wheel.sh \
            "${{ steps.py.outputs.exe }}" \
            ./package \
            ./dist/

      # --- Smoke test: install wheel in fresh venv and verify ---
      - name: Test wheel
        run: |
          PY="${{ steps.py.outputs.exe }}"
          "$PY" -m venv /tmp/test-whl
          # --find-links picks up the local wheel; pip fetches deps (numpy etc.) from PyPI
          /tmp/test-whl/bin/python -m pip install --find-links dist/ llvm-ir2vec
          /tmp/test-whl/bin/python -c "
          import ir2vec
          import os
          print(f'Version: {ir2vec.__version__}')
          assert hasattr(ir2vec, 'initEmbedding'), 'initEmbedding missing'
          print('initEmbedding: OK')
          assert hasattr(ir2vec, 'vocab'), 'vocab module missing'
          path = ir2vec.vocab.seedEmbedding75D
          assert os.path.isfile(path), f'Vocab file not found: {path}'
          print(f'Vocab 75D: {path}')
          print('Wheel test: OK')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 7

  # ===========================================================================
  # PUBLISH to TestPyPI
  # ===========================================================================
  publish-testpypi:
    name: "Publish → TestPyPI"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/p/llvm-ir2vec

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: |
          echo "=== Wheels to publish ==="
          ls -lh dist/
          echo "Total: $(ls dist/*.whl 2>/dev/null | wc -l) wheels"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true